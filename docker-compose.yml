services:
  db:
    image: postgres:16
    container_name: riseup-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: rise_up_together
    ports:
      - "5432:5432"
    volumes:
      - riseup-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rise_up_together"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  riseup-pg-data:
